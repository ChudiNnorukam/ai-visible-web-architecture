name: live-audit-scheduled

on:
  workflow_dispatch:
  schedule:
    - cron: "0 15 * * *"

jobs:
  live-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Run live audit
        run: |
          mkdir -p artifacts
          python3 scripts/audit_live_surfaces.py --json-out artifacts/live-audit.json

      - name: Upload live audit artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: live-audit
          path: artifacts/live-audit.json
