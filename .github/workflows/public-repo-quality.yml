name: public-repo-quality

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Compile Python scripts
        run: python3 -m py_compile scripts/*.py

      - name: Run repository quality checks
        run: python3 scripts/check_repo_quality.py

      - name: Run live audit
        run: |
          mkdir -p artifacts
          python3 scripts/audit_live_surfaces.py --json-out artifacts/live-audit.json

      - name: Upload live audit artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: live-audit
          path: artifacts/live-audit.json

      - name: Markdown lint
        run: npx --yes markdownlint-cli2 "**/*.md"

      - name: Link check
        uses: lycheeverse/lychee-action@v2.8.0
        with:
          args: >-
            --verbose
            --no-progress
            --exclude-path .github
            --exclude-file .lycheeignore
            README.md
            ./**/*.md
